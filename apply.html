  <div class="heading">
    <h1>Apply Now</h1>
  </div>
  <div class="job-details text-center mb-4">
      <h3 id="jobTitle"></h3>
      <p id="jobDescription" class="text-muted"></p>
  </div>
      <div class="action">
          <form class="register-form">

          <p><sup>*</sup> Required fields.</p>

          <div class="form-group">
              <label for="fname">First Name <sup>*</sup></label>
              <input type="text" id="fname" placeholder="Enter your first name" required>
          </div>

          <div class="form-group">
              <label for="mname">Middle Name (optional)</label>
              <input type="text" id="mname" placeholder="Enter your middle name">
          </div>

          <div class="form-group">
              <label for="lname">Last Name <sup>*</sup></label>
              <input type="text" id="lname" placeholder="Enter your last name" required>
          </div>

          <div class="form-group">
              <label for="mail">Email ID <sup>*</sup></label>
              <input type="email" id="mail" placeholder="Enter your email id" required>
          </div>

          <div class="form-group">
              <label for="mobile">Mobile Number <sup>*</sup></label>
              <input type="tel" id="mobile" placeholder="Enter your Mobile Number" required>
          </div>
          <div class="form-group">
              <label for="tear">Year of Graduation <sup>*</sup></label>
              <input type="text" id="year" placeholder="Year of Graduation" required>
          </div>
          
          <div class="form-group">
      <label for="gender">Gender <sup>*</sup></label>
      <select name="gender" id="gender" required>
          <option value="">--- Select ---</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
      </select>
  </div>
  <div class="form-group">
      <label for="exp">Experience In Years <sup>*</sup></label>
      <select name="exp" id="exp" required>
          <option value="">--- None ---</option>
          <option value="FRESHER">Fresher</option>
          <option value="0-1 Year">0-1 Year</option>
          <option value="1-2 Years">1-2 Years</option>
          <option value="2-3 Years">2-3 Years</option>
          <option value="3-4 Years">3-4 Years</option>
          <option value="4-5 Years">4-5 Years</option>
          <option value="5+ Years">5+ Years</option>
      </select>
  </div>
  <div class="form-group">
              <label for="cuurrent">Current Employer <sup>*</sup></label>
              <input type="text" id="year" placeholder="Current employer" required>
          </div>
        <div class="form-group">
      <label for="ctc">Current CTC (In Lakhs Per Annum)  <sup>*</sup></label>
      <select name="ctc" id="ctc" required>
          <option value="">--- None ---</option>
          <option value="Not Applicable">Not Applicable</option>
          <option value="1-3">1-3</option>
          <option value="3-5">3-5</option>
          <option value="5-7">5-7</option>
          <option value="7-9">7-9</option>
          <option value="9-10">9-10</option>
          <option value="10+">10+</option>
      </select>
  </div>
  <div class="form-group">
      <label for="exp">Expected CTC (In Lakhs Per Annum)<sup>*</sup></label>
      <select name="exp" id="exp" required>
          <option value="">--- None ---</option>
          <option value="Not Applicable">Not Applicable</option>
          <option value="1-3">1-3</option>
          <option value="3-5">3-5</option>
          <option value="5-7">5-7</option>
          <option value="7-9">7-9</option>
          <option value="9-10">9-10</option>
          <option value="10+">10+</option>
      </select>
  </div>
  <div class="form-group">
    <label>Skill Sets<sup>*</sup></label>

    <div class="tag-box" onclick="focusInput()">
      <div id="tags"></div>
      <input type="text" id="input" placeholder="Type skills...">
    </div>

    <!-- ✅ ADD THIS -->
    <div id="suggestions" class="suggestions"></div>
  </div>
  <div class="mb-3" style="font-family: 'Poppins', sans-serif; font-weight: 500;">
    <label for="formFile" class="form-label">Upload Your Resume <sup>*</sup></label>
    <input class="form-control" type="file" id="formFile" required>
  </div>
  <div class="form-check">
              <input type="checkbox" id="agree">
              <label for="agree">
                  By checking the box, you acknowledge that you have read and understood the 
                  <a href="./privacy.html">Privacy Notice.</a>
              </label>
          </div>
          <button type="submit">Submit</button>
      </form>
  </div>
