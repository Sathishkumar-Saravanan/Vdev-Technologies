<style>
    body{
background: linear-gradient(135deg, #2c3e50, #4ca1af);
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
    }
    #loginBtn{
        background: linear-gradient(135deg, #007bff, #0056b3);
border-radius: 8px;
transition: 0.3s;
    }
    #loginBtn:hover{
        transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .form-group input:focus{
  border-color: #007bff;
  box-shadow: 0 0 5px rgba(0,123,255,0.5);
}
.form-group input{
background: #ffffff;
border: 1px solid #ccc;
font-family: 'Inter', sans-serif;
font-size: 16px;
    }

.register-form{
    background: rgba(255, 255, 255, 0.9);
backdrop-filter: blur(10px);
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.vers p{
text-align: center;
  font-size: 12px;
  color: #777;
  margin-top: 10px;
      font-family: 'Poppins', sans-serif;

}
.copy p{
    font-size: 13px;
    text-align: center;
      color: #777;
      font-family: 'Poppins', sans-serif;
}
</style>
</head>
<body>
    <div class="account">
    <form class="register-form"; border-radius: 12px;>
        <h2><big style="color: red;font-weight: bold; font-family: 'Poppins', sans-serif; font-weight: 600; letter-spacing: 1px;">V</big>dev 
            <big style="color: red;font-weight: bold; font-family: 'Poppins', sans-serif; font-weight: 600; letter-spacing: 1px;">T</big>echnology</h2>
        <h3>Login</h3>

        <div class="form-group">
            <label for="mail">Email ID <sup>*</sup></label>
            <input type="email" id="loginemail" placeholder="Enter your email id" required>
        </div>

        <div class="form-group">
            <label for="pass">Password <sup>*</sup></label>
            <input type="password" id="loginpassword" placeholder="Enter your password">
            <div id="toggleBtn"></div>
        </div>
        <div class="forgot">
            <a href="./forgot.html">Forgot password</a>
        </div>
         <div class="new">
        <p>Do not have an account?<a href="./register.html"> Register here</a></p>
        </div>
<button type="button" id="loginBtn" style="">Login Now</button> 
<div class="vers">
    <p>Version 0.0.1</p>
</div>  
<div class="copy">
    <p>&copy 2026 Vdev Technologies. All Rights Reserved</p>
</div>
    </form>

</div>
 
<div id="loader" class="loader-container">
  <div style="text-align:center;">
    <div class="spinner"></div>
    <p style="margin-top:10px; font-weight:500;">Logging you in...</p>
  </div>
</div>
<script src="./login.js"></script>
</body>
